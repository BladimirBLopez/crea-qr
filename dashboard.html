<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CreaQR — Mis códigos QR</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f0f4f8; min-height: 100vh; }

    /* NAV */
    nav { background: white; border-bottom: 1px solid #e2e8f0; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 58px; position: sticky; top: 0; z-index: 100; }
    .logo { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 17px; color: #1e293b; text-decoration: none; }
    .logo-icon { width: 32px; height: 32px; background: #1a73e8; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { width: 18px; height: 18px; fill: white; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .user-name { font-size: 13px; font-weight: 600; color: #475569; }
    .btn-logout { font-size: 13px; color: #dc2626; background: none; border: none; cursor: pointer; font-weight: 500; }

    /* MAIN */
    main { max-width: 960px; margin: 0 auto; padding: 28px 20px; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .page-header h1 { font-size: 22px; font-weight: 800; color: #1e293b; }
    .btn-new { background: #34a853; color: white; padding: 11px 20px; border-radius: 10px; font-size: 14px; font-weight: 700; border: none; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: background 0.2s; }
    .btn-new:hover { background: #2d9249; }

    /* SEARCH */
    .search-bar { position: relative; margin-bottom: 20px; }
    .search-bar input { width: 100%; border: 1px solid #e2e8f0; border-radius: 10px; padding: 11px 14px 11px 40px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; background: white; }
    .search-bar input:focus { border-color: #1a73e8; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 15px; }

    /* EMPTY */
    .empty { text-align: center; padding: 60px 20px; }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty h2 { font-size: 18px; font-weight: 700; color: #1e293b; margin-bottom: 8px; }
    .empty p { font-size: 14px; color: #64748b; margin-bottom: 24px; }

    /* QR GRID */
    .qr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
    .qr-card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .qr-card-top { display: flex; gap: 14px; align-items: flex-start; }
    .qr-thumb { width: 72px; height: 72px; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; flex-shrink: 0; background: white; display: flex; align-items: center; justify-content: center; }
    .qr-thumb canvas, .qr-thumb img { width: 72px !important; height: 72px !important; }
    .qr-info { flex: 1; min-width: 0; }
    .qr-type-badge { display: inline-block; background: #eff6ff; color: #1a73e8; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; margin-bottom: 6px; }
    .qr-name { font-size: 14px; font-weight: 700; color: #1e293b; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .qr-content { font-size: 12px; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .qr-date { font-size: 11px; color: #cbd5e1; margin-top: 4px; }
    .qr-actions { display: flex; gap: 8px; }
    .btn-action { flex: 1; padding: 8px; border-radius: 8px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; }
    .btn-dl { background: #eff6ff; color: #1a73e8; }
    .btn-dl:hover { background: #1a73e8; color: white; }
    .btn-del { background: #fef2f2; color: #dc2626; }
    .btn-del:hover { background: #dc2626; color: white; }

    /* LOADING */
    .loading { text-align: center; padding: 48px; color: #94a3b8; font-size: 14px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #e2e8f0; border-top-color: #1a73e8; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* TOAST */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M3 3h7v7H3V3zm2 2v3h3V5H5zm9-2h7v7h-7V3zm2 2v3h3V5h-3zM3 14h7v7H3v-7zm2 2v3h3v-3H5zm11 0h2v2h-2v-2zm2-2h2v2h-2v-2zm-2 4h2v2h-2v-2zm2 0h2v2h-2v-2zm-4-4h2v2h-2v-2zm-2 2h2v2h-2v-2zm4 2h2v2h-2v-2z"/></svg></div>
    CreaQR
  </a>
  <div class="nav-right">
    <span class="user-name" id="user-name">...</span>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>Mis códigos QR</h1>
    <a class="btn-new" href="crear.html">＋ Crear QR</a>
  </div>

  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Buscar por nombre..." oninput="filterQRs()" />
  </div>

  <div id="content">
    <div class="loading"><div class="spinner"></div>Cargando tus QRs...</div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
// CreaQR - Configuración JSONBin
const JSONBIN_API_KEY = '$2a$10$YohijmJms8cH8Wcz7UPRoeLVTcuLN9GArGOh4xg3lwW8HWDTuBjlu';
const JSONBIN_BASE = 'https://api.jsonbin.io/v3';

// ─── USUARIOS ───────────────────────────────────────────────
async function getBin(binId) {
  const r = await fetch(`${JSONBIN_BASE}/b/${binId}/latest`, {
    headers: { 'X-Master-Key': JSONBIN_API_KEY }
  });
  const d = await r.json();
  return d.record;
}

async function updateBin(binId, data) {
  await fetch(`${JSONBIN_BASE}/b/${binId}`, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': JSONBIN_API_KEY
    },
    body: JSON.stringify(data)
  });
}

async function createBin(data, name) {
  const r = await fetch(`${JSONBIN_BASE}/b`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': JSONBIN_API_KEY,
      'X-Bin-Name': name,
      'X-Bin-Private': 'true'
    },
    body: JSON.stringify(data)
  });
  const d = await r.json();
  return d.metadata.id;
}

// ─── AUTH ────────────────────────────────────────────────────
async function getUsersBinId() {
  // Guardamos el ID del bin de usuarios en localStorage
  let id = localStorage.getItem('creaQR_usersBin');
  if (!id) {
    // Buscar bins existentes
    try {
      const r = await fetch(`${JSONBIN_BASE}/b`, {
        headers: { 'X-Master-Key': JSONBIN_API_KEY }
      });
      const d = await r.json();
      const found = d.find && d.find(b => b.snippetMeta?.name === 'creaQR_users');
      if (found) { id = found.id; localStorage.setItem('creaQR_usersBin', id); }
    } catch(e) {}
  }
  if (!id) {
    id = await createBin({ users: [] }, 'creaQR_users');
    localStorage.setItem('creaQR_usersBin', id);
  }
  return id;
}

async function register(name, email, password) {
  const binId = await getUsersBinId();
  const data = await getBin(binId);
  const users = data.users || [];
  if (users.find(u => u.email === email)) throw new Error('Este email ya está registrado');
  const user = { id: 'u_' + Date.now(), name, email, password: btoa(password), qrsBinId: null, createdAt: new Date().toISOString() };
  users.push(user);
  await updateBin(binId, { users });
  const sessionUser = { id: user.id, name: user.name, email: user.email, qrsBinId: null };
  localStorage.setItem('creaQR_session', JSON.stringify(sessionUser));
  return sessionUser;
}

async function login(email, password) {
  const binId = await getUsersBinId();
  const data = await getBin(binId);
  const users = data.users || [];
  const user = users.find(u => u.email === email && u.password === btoa(password));
  if (!user) throw new Error('Email o contraseña incorrectos');
  const sessionUser = { id: user.id, name: user.name, email: user.email, qrsBinId: user.qrsBinId };
  localStorage.setItem('creaQR_session', JSON.stringify(sessionUser));
  return sessionUser;
}

function logout() {
  localStorage.removeItem('creaQR_session');
  window.location.href = 'login.html';
}

function getSession() {
  const s = localStorage.getItem('creaQR_session');
  return s ? JSON.parse(s) : null;
}

function requireAuth() {
  const s = getSession();
  if (!s) window.location.href = 'login.html';
  return s;
}

// ─── QRs ─────────────────────────────────────────────────────
async function getUserQrsBinId(user) {
  if (user.qrsBinId) return user.qrsBinId;
  // Crear bin de QRs para este usuario
  const binId = await createBin({ qrs: [] }, `creaQR_qrs_${user.id}`);
  // Actualizar usuario en users bin
  const usersBinId = await getUsersBinId();
  const data = await getBin(usersBinId);
  const users = data.users || [];
  const idx = users.findIndex(u => u.id === user.id);
  if (idx !== -1) { users[idx].qrsBinId = binId; await updateBin(usersBinId, { users }); }
  // Actualizar sesión
  user.qrsBinId = binId;
  localStorage.setItem('creaQR_session', JSON.stringify(user));
  return binId;
}

async function getMyQRs() {
  const user = getSession();
  if (!user) return [];
  const binId = await getUserQrsBinId(user);
  const data = await getBin(binId);
  return data.qrs || [];
}

async function saveQR(qrData) {
  const user = getSession();
  const binId = await getUserQrsBinId(user);
  const data = await getBin(binId);
  const qrs = data.qrs || [];
  const newQR = { id: 'qr_' + Date.now(), ...qrData, userId: user.id, createdAt: new Date().toISOString(), scans: 0 };
  qrs.unshift(newQR);
  await updateBin(binId, { qrs });
  return newQR;
}

async function deleteQR(qrId) {
  const user = getSession();
  const binId = await getUserQrsBinId(user);
  const data = await getBin(binId);
  const qrs = (data.qrs || []).filter(q => q.id !== qrId);
  await updateBin(binId, { qrs });
}

async function updateQR(qrId, updates) {
  const user = getSession();
  const binId = await getUserQrsBinId(user);
  const data = await getBin(binId);
  const qrs = data.qrs || [];
  const idx = qrs.findIndex(q => q.id === qrId);
  if (idx !== -1) { qrs[idx] = { ...qrs[idx], ...updates, updatedAt: new Date().toISOString() }; }
  await updateBin(binId, { qrs });
}

</script>
<script>
  const user = requireAuth();
  document.getElementById('user-name').textContent = user.name;

  let allQRs = [];

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function renderQRCard(qr) {
    const div = document.createElement('div');
    div.className = 'qr-card';
    div.dataset.id = qr.id;
    div.innerHTML = `
      <div class="qr-card-top">
        <div class="qr-thumb" id="thumb-${qr.id}"></div>
        <div class="qr-info">
          <span class="qr-type-badge">${qr.type}</span>
          <div class="qr-name">${qr.name}</div>
          <div class="qr-content">${qr.content}</div>
          <div class="qr-date">${new Date(qr.createdAt).toLocaleDateString('es-ES')}</div>
        </div>
      </div>
      <div class="qr-actions">
        <button class="btn-action btn-dl" onclick="downloadQR('${qr.id}', '${qr.name}')">⬇ Descargar</button>
        <button class="btn-action btn-del" onclick="removeQR('${qr.id}')">🗑 Eliminar</button>
      </div>
    `;
    return div;
  }

  function generateThumb(containerId, content, color, bg) {
    const el = document.getElementById(containerId);
    if (!el) return;
    try {
      new QRCode(el, { text: content || 'https://creaQR.com', width: 72, height: 72, colorDark: color || '#000000', colorLight: bg || '#ffffff', correctLevel: QRCode.CorrectLevel.M });
    } catch(e) {}
  }

  function renderAll(qrs) {
    const c = document.getElementById('content');
    if (!qrs.length) {
      c.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><h2>No tienes QRs aún</h2><p>Crea tu primer código QR en segundos.</p><a class="btn-new" href="crear.html">＋ Crear mi primer QR</a></div>`;
      return;
    }
    const grid = document.createElement('div');
    grid.className = 'qr-grid';
    qrs.forEach(qr => grid.appendChild(renderQRCard(qr)));
    c.innerHTML = '';
    c.appendChild(grid);
    // Generar miniaturas después del render
    qrs.forEach(qr => setTimeout(() => generateThumb(`thumb-${qr.id}`, qr.content, qr.color, qr.bgColor), 100));
  }

  function filterQRs() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = q ? allQRs.filter(qr => qr.name.toLowerCase().includes(q) || qr.content.toLowerCase().includes(q)) : allQRs;
    renderAll(filtered);
  }

  async function removeQR(id) {
    if (!confirm('¿Eliminar este código QR?')) return;
    try {
      await deleteQR(id);
      allQRs = allQRs.filter(q => q.id !== id);
      renderAll(allQRs);
      showToast('QR eliminado');
    } catch(e) { showToast('Error al eliminar'); }
  }

  function downloadQR(id, name) {
    const canvas = document.querySelector(`#thumb-${id} canvas`);
    if (!canvas) return showToast('Genera el QR primero');
    // Crear canvas más grande para descarga
    const big = document.createElement('canvas');
    big.width = 400; big.height = 400;
    const ctx = big.getContext('2d');
    ctx.drawImage(canvas, 0, 0, 400, 400);
    const link = document.createElement('a');
    link.download = `${name || 'qr'}.png`;
    link.href = big.toDataURL('image/png');
    link.click();
    showToast('QR descargado ✓');
  }

  // Cargar QRs
  (async () => {
    try {
      allQRs = await getMyQRs();
      renderAll(allQRs);
    } catch(e) {
      document.getElementById('content').innerHTML = '<div class="loading">Error al cargar. Recarga la página.</div>';
    }
  })();
</script>
</body>
</html>
