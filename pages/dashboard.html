<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CreaQR — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script async crossorigin="anonymous" data-clerk-publishable-key="pk_test_cmFyZS10b2FkLTY1LmNsZXJrLmFjY291bnRzLmRldiQ" src="https://rare-toad-65.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js" type="text/javascript"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--blue:#1a73e8;--green:#34a853;--dark:#1e293b;--mid:#475569;--light:#94a3b8;--border:#e2e8f0;--bg:#f0f4f8;--white:#fff}
    body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh}

    /* NAV */
    nav{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100}
    .logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:17px;color:var(--dark);text-decoration:none}
    .logo-icon{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center}
    .logo-icon svg{width:18px;height:18px;fill:white}
    .nav-right{display:flex;align-items:center;gap:12px}
    #clerk-user-button{}

    /* SIDEBAR */
    .layout{display:flex;min-height:calc(100vh - 58px)}
    .sidebar{width:220px;background:var(--white);border-right:1px solid var(--border);padding:20px 12px;flex-shrink:0}
    .sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-size:14px;font-weight:500;color:var(--mid);text-decoration:none;margin-bottom:4px;cursor:pointer;transition:all .2s}
    .sidebar-item:hover{background:#f0f4f8;color:var(--dark)}
    .sidebar-item.active{background:#eff6ff;color:var(--blue);font-weight:600}
    .sidebar-item .si-icon{font-size:18px;width:24px;text-align:center}
    .sidebar-divider{height:1px;background:var(--border);margin:12px 0}

    /* MAIN */
    .main{flex:1;padding:28px 20px;max-width:100%;overflow:auto}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
    .page-header h1{font-size:22px;font-weight:800;color:var(--dark)}
    .btn-new{background:var(--green);color:white;padding:11px 20px;border-radius:10px;font-size:14px;font-weight:700;border:none;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:background .2s}
    .btn-new:hover{background:#2d9249}

    /* STATS */
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
    .stat-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:14px 10px;text-align:center}
    .stat-num{font-size:22px;font-weight:800;color:var(--dark);margin-bottom:4px}
    .stat-label{font-size:12px;color:var(--light);font-weight:500}

    /* SEARCH & FILTER */
    .toolbar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px}
    .search-wrap{flex:1;min-width:200px;position:relative}
    .search-wrap input{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 14px 10px 38px;font-size:14px;font-family:'Inter',sans-serif;outline:none;background:var(--white)}
    .search-wrap input:focus{border-color:var(--blue)}
    .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px}
    .filter-btn{padding:8px 14px;border:1px solid var(--border);border-radius:10px;font-size:12px;font-weight:500;background:var(--white);color:var(--mid);cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
    .filter-btn.active{border-color:var(--blue);color:var(--blue);background:#eff6ff}

    /* QR GRID */
    .qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
    .qr-card{background:var(--white);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:box-shadow .2s;cursor:pointer}
    .qr-card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.1)}
    .qr-card-header{padding:16px;display:flex;gap:12px;align-items:flex-start}
    .qr-thumb{width:70px;height:70px;border:1px solid var(--border);border-radius:10px;overflow:hidden;flex-shrink:0;background:white;display:flex;align-items:center;justify-content:center}
    .qr-info{flex:1;min-width:0}
    .qr-badge{display:inline-flex;align-items:center;gap:4px;background:#eff6ff;color:var(--blue);font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;margin-bottom:6px}
    .qr-name{font-size:14px;font-weight:700;color:var(--dark);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .qr-content{font-size:11px;color:var(--light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .qr-card-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px;background:#fafafa}
    .btn-sm{flex:1;padding:7px;border-radius:8px;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all .2s}
    .btn-dl{background:#eff6ff;color:var(--blue)}
    .btn-dl:hover{background:var(--blue);color:white}
    .btn-del{background:#fef2f2;color:#dc2626}
    .btn-del:hover{background:#dc2626;color:white}
    .qr-date{font-size:10px;color:#cbd5e1;padding:0 16px 10px}

    /* EMPTY */
    .empty{text-align:center;padding:60px 20px}
    .empty-icon{font-size:52px;margin-bottom:16px}
    .empty h2{font-size:18px;font-weight:700;color:var(--dark);margin-bottom:8px}
    .empty p{font-size:14px;color:var(--light);margin-bottom:24px}

    /* LOADING */
    .loading{text-align:center;padding:48px;color:var(--light);font-size:14px}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* TOAST */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--dark);color:white;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1}

    @media(max-width:600px){
      .sidebar{display:none}
      .stats-row{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M3 3h7v7H3V3zm2 2v3h3V5H5zm9-2h7v7h-7V3zm2 2v3h3V5h-3zM3 14h7v7H3v-7zm2 2v3h3v-3H5zm11 0h2v2h-2v-2zm2-2h2v2h-2v-2zm-2 4h2v2h-2v-2zm2 0h2v2h-2v-2zm-4-4h2v2h-2v-2zm-2 2h2v2h-2v-2zm4 2h2v2h-2v-2z"/></svg></div>
    CreaQR
  </a>
  <div class="nav-right">
    <div id="clerk-user-button"></div>
  </div>
</nav>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <a class="sidebar-item active" href="dashboard.html">
      <span class="si-icon">📊</span> Códigos QR
    </a>
    <a class="sidebar-item" href="crear.html">
      <span class="si-icon">➕</span> Crear QR
    </a>
    <div class="sidebar-divider"></div>
    <a class="sidebar-item" href="#" onclick="signOut()">
      <span class="si-icon">🚪</span> Cerrar sesión
    </a>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="page-header">
      <h1>Mis códigos QR</h1>
      <a class="btn-new" href="crear.html">＋ Crear QR</a>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="stat-total">—</div>
        <div class="stat-label">Total QRs</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-week">—</div>
        <div class="stat-label">Esta semana</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-types">—</div>
        <div class="stat-label">Tipos distintos</div>
      </div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search" placeholder="Buscar por nombre..." oninput="filterQRs()"/>
      </div>
      <button class="filter-btn active" onclick="setFilter('all',this)">Todos</button>
      <button class="filter-btn" onclick="setFilter('url',this)">URL</button>
      <button class="filter-btn" onclick="setFilter('vcard',this)">vCard</button>
      <button class="filter-btn" onclick="setFilter('wifi',this)">WiFi</button>
    </div>

    <div id="content">
      <div class="loading"><div class="spinner"></div>Cargando tus QRs...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const JSONBIN_API_KEY = '$2a$10$YohijmJms8cH8Wcz7UPRoeLVTcuLN9GArGOh4xg3lwW8HWDTuBjlu';
const JSONBIN_BASE = 'https://api.jsonbin.io/v3';

let allQRs = [];
let activeFilter = 'all';

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function getBin(binId) {
  const r = await fetch(`${JSONBIN_BASE}/b/${binId}/latest`, {
    headers: { 'X-Master-Key': JSONBIN_API_KEY }
  });
  const d = await r.json();
  return d.record;
}

async function updateBin(binId, data) {
  await fetch(`${JSONBIN_BASE}/b/${binId}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY },
    body: JSON.stringify(data)
  });
}

async function createBin(data, name) {
  const r = await fetch(`${JSONBIN_BASE}/b`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY, 'X-Bin-Name': name, 'X-Bin-Private': 'true' },
    body: JSON.stringify(data)
  });
  const d = await r.json();
  return d.metadata.id;
}

async function getOrCreateBin(userId) {
  const key = `creaQR_bin_${userId}`;
  let binId = localStorage.getItem(key);
  if (!binId) {
    binId = await createBin({ qrs: [] }, `creaQR_${userId}`);
    localStorage.setItem(key, binId);
  }
  return binId;
}

async function loadQRs(userId) {
  const binId = await getOrCreateBin(userId);
  const data = await getBin(binId);
  return data.qrs || [];
}

async function deleteQR(userId, qrId) {
  const binId = await getOrCreateBin(userId);
  const data = await getBin(binId);
  const qrs = (data.qrs || []).filter(q => q.id !== qrId);
  await updateBin(binId, { qrs });
}

function generateThumb(containerId, content, color, bg) {
  const el = document.getElementById(containerId);
  if (!el || !content) return;
  try {
    new QRCode(el, { text: content, width: 70, height: 70, colorDark: color||'#000', colorLight: bg||'#fff', correctLevel: QRCode.CorrectLevel.M });
  } catch(e) {}
}

function renderQRs(qrs) {
  const c = document.getElementById('content');
  if (!qrs.length) {
    c.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><h2>No tienes QRs aún</h2><p>Crea tu primer código QR en segundos.</p><a class="btn-new" href="crear.html">＋ Crear mi primer QR</a></div>`;
    return;
  }
  const grid = document.createElement('div');
  grid.className = 'qr-grid';
  qrs.forEach(qr => {
    const card = document.createElement('div');
    card.className = 'qr-card';
    card.innerHTML = `
      <div class="qr-card-header">
        <div class="qr-thumb" id="thumb-${qr.id}"></div>
        <div class="qr-info">
          <div class="qr-badge">${qr.icon||'🔗'} ${qr.type||'QR'}</div>
          <div class="qr-name">${qr.name}</div>
          <div class="qr-content">${qr.content}</div>
        </div>
      </div>
      <div class="qr-date">${new Date(qr.createdAt).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'})}</div>
      <div class="qr-card-footer">
        <button class="btn-sm btn-dl" onclick="downloadQR('${qr.id}','${qr.name}')">⬇ Descargar</button>
        <button class="btn-sm btn-del" onclick="removeQR('${qr.id}')">🗑 Eliminar</button>
      </div>
    `;
    grid.appendChild(card);
  });
  c.innerHTML = '';
  c.appendChild(grid);
  qrs.forEach(qr => setTimeout(() => generateThumb(`thumb-${qr.id}`, qr.content, qr.color, qr.bgColor), 100));
}

function updateStats(qrs) {
  document.getElementById('stat-total').textContent = qrs.length;
  const week = qrs.filter(q => {
    const d = new Date(q.createdAt);
    const now = new Date();
    return (now - d) < 7 * 24 * 60 * 60 * 1000;
  }).length;
  document.getElementById('stat-week').textContent = week;
  const types = new Set(qrs.map(q => q.type)).size;
  document.getElementById('stat-types').textContent = types;
}

function filterQRs() {
  const q = document.getElementById('search').value.toLowerCase();
  let filtered = activeFilter === 'all' ? allQRs : allQRs.filter(qr => qr.type?.toLowerCase().includes(activeFilter));
  if (q) filtered = filtered.filter(qr => qr.name.toLowerCase().includes(q) || qr.content.toLowerCase().includes(q));
  renderQRs(filtered);
}

function setFilter(type, el) {
  activeFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  filterQRs();
}

function downloadQR(id, name) {
  const canvas = document.querySelector(`#thumb-${id} canvas`);
  if (!canvas) return toast('Espera un momento...');
  const big = document.createElement('canvas');
  big.width = 800; big.height = 800;
  const ctx = big.getContext('2d');
  ctx.drawImage(canvas, 0, 0, 800, 800);
  const a = document.createElement('a');
  a.download = (name||'qr') + '.png';
  a.href = big.toDataURL('image/png'); a.click();
  toast('Descargado ✓');
}

let currentUserId = null;

async function removeQR(id) {
  if (!confirm('¿Eliminar este código QR?')) return;
  try {
    await deleteQR(currentUserId, id);
    allQRs = allQRs.filter(q => q.id !== id);
    updateStats(allQRs);
    filterQRs();
    toast('QR eliminado ✓');
  } catch(e) { toast('Error al eliminar'); }
}

async function signOut() {
  await window.Clerk.signOut();
  window.location.href = 'login.html';
}

window.addEventListener('load', async () => {
  await window.Clerk.load();
  const user = window.Clerk.user;
  if (!user) { window.location.href = 'login.html'; return; }

  currentUserId = user.id;

  // Mostrar botón de usuario de Clerk
  window.Clerk.mountUserButton(document.getElementById('clerk-user-button'));

  try {
    allQRs = await loadQRs(user.id);
    updateStats(allQRs);
    renderQRs(allQRs);
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="loading">Error al cargar. Recarga la página.</div>';
  }
});
</script>
</body>
</html>
