<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CreaQR — Iniciar sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script async crossorigin="anonymous" data-clerk-publishable-key="pk_test_cmFyZS10b2FkLTY1LmNsZXJrLmFjY291bnRzLmRldiQ" src="https://rare-toad-65.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js" type="text/javascript"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#f0f4f8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
    .logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px;color:#1e293b;margin-bottom:24px;text-decoration:none}
    .logo-icon{width:36px;height:36px;background:#1a73e8;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .logo-icon svg{width:20px;height:20px;fill:white}
    .card{background:white;border-radius:20px;padding:24px 20px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,0.08);overflow:hidden}
    .card-title{font-size:18px;font-weight:800;color:#1e293b;margin-bottom:4px;text-align:center}
    .card-sub{font-size:13px;color:#64748b;text-align:center;margin-bottom:20px}
    #clerk-sign-in{width:100%;overflow:hidden}
    .cl-rootBox,.cl-card{width:100%!important;box-shadow:none!important;padding:0!important}
    .loading{text-align:center;padding:40px;color:#94a3b8;font-size:14px}
    .spinner{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#1a73e8;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:480px){body{padding:12px;justify-content:flex-start;padding-top:40px}.card{padding:20px 16px}}
  </style>
</head>
<body>

<a class="logo" href="index.html">
  <div class="logo-icon">
    <svg viewBox="0 0 24 24"><path d="M3 3h7v7H3V3zm2 2v3h3V5H5zm9-2h7v7h-7V3zm2 2v3h3V5h-3zM3 14h7v7H3v-7zm2 2v3h3v-3H5zm11 0h2v2h-2v-2zm2-2h2v2h-2v-2zm-2 4h2v2h-2v-2zm2 0h2v2h-2v-2zm-4-4h2v2h-2v-2zm-2 2h2v2h-2v-2zm4 2h2v2h-2v-2z"/></svg>
  </div>
  CreaQR
</a>

<div class="card">
  <div class="card-title">Bienvenido a CreaQR</div>
  <div class="card-sub">Inicia sesión o crea tu cuenta gratis</div>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    Cargando...
  </div>
  <div id="clerk-sign-in"></div>
</div>

<script>
  window.addEventListener('load', async () => {
    await window.Clerk.load();

    const user = window.Clerk.user;
    if (user) {
      window.location.href = 'dashboard.html';
      return;
    }

    document.getElementById('loading').style.display = 'none';

    window.Clerk.mountSignIn(document.getElementById('clerk-sign-in'), {
      afterSignInUrl: '/dashboard',
      afterSignUpUrl: '/dashboard',
      appearance: {
        variables: {
          colorPrimary: '#1a73e8',
          colorSuccess: '#34a853',
          borderRadius: '10px',
          fontFamily: 'Inter, sans-serif'
        },
        elements: {
          card: { boxShadow: 'none', padding: '0' },
          headerTitle: { display: 'none' },
          headerSubtitle: { display: 'none' },
          socialButtonsBlockButton: {
            border: '1px solid #e2e8f0',
            borderRadius: '10px',
            fontWeight: '600'
          },
          formButtonPrimary: {
            background: '#34a853',
            borderRadius: '10px',
            fontWeight: '700',
            fontSize: '15px'
          },
          footerActionLink: { color: '#1a73e8', fontWeight: '600' }
        }
      }
    });
  });
</script>
</body>
</html>
